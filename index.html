<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Pet Shop & Gas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px 12px 0 0; margin: -20px -20px 20px -20px; display: flex; justify-content: space-between; align-items: center; }
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #ddd; font-size: 1rem; }
        .search-box { width: 100%; margin-bottom: 20px; box-sizing: border-box; border: 2px solid #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .total-section { text-align: right; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .total-final { color: #27ae60; font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .btn-cobrar { background: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-cobrar:hover { background: #219150; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0;">Mi Negocio</h1>
            <span>Sucursal: </span>
            <select id="select-sucursal">
                <option>Centro</option>
                <option>Norte</option>
                <option>Sur</option>
            </select>
        </div>
        <div id="status">● Conectado</div>
    </div>

    <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar producto (Ej: Perro, Gato, Gas...)" oninput="buscar()">
    
    <div id="resultados-busqueda" style="margin-bottom: 20px;"></div>

    <table id="tabla-venta">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cant. (Kg/Un)</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="carrito-body">
            </tbody>
    </table>

    <div class="total-section">
        <div style="font-size: 1.2rem;">
            Subtotal: $<span id="subtotal">0.00</span><br>
            Descuento: $<input type="number" id="descuento" value="0" style="width: 100px;" oninput="recalcular()">
        </div>
        <div class="total-final">Total: $<span id="total-final">0.00</span></div>
        <button class="btn-cobrar" onclick="alert('Venta procesada con éxito')">Finalizar Venta</button>
    </div>
</div>

<script>
    // Base de datos de ejemplo (Mañana pondremos los tuyos reales)
    const productos = [
        { id: 1, nombre: "Alimento Perro Premium", precio: 2000 },
        { id: 2, nombre: "Alimento Gato Adulto", precio: 1800 },
        { id: 3, nombre: "Garrafa Gas 10kg", precio: 5500 },
        { id: 4, nombre: "Piedras Sanitarias 4kg", precio: 1200 }
    ];

    let carrito = [];

    function buscar() {
        const termino = document.getElementById('buscador').value.toLowerCase();
        const divResultados = document.getElementById('resultados-busqueda');
        divResultados.innerHTML = "";
        
        if(termino.length < 2) return;

        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(termino));
        filtrados.forEach(p => {
            const btn = document.createElement('button');
            btn.innerText = `+ ${p.nombre} ($${p.precio})`;
            btn.style = "margin: 5px; padding: 8px; cursor: pointer; border-radius: 5px; border: 1px solid #3498db; background: #ebf5fb;";
            btn.onclick = () => agregarAlCarrito(p);
            divResultados.appendChild(btn);
        });
    }

    function agregarAlCarrito(producto) {
        const existe = carrito.find(item => item.id === producto.id);
        if (existe) {
            existe.cantidad++;
        } else {
            carrito.push({...producto, cantidad: 1});
        }
        dibujarTabla();
    }

    function eliminar(id) {
        carrito = carrito.filter(item => item.id !== id);
        dibujarTabla();
    }

    function dibujarTabla() {
        const body = document.getElementById('carrito-body');
        body.innerHTML = "";
        let subtotalAcumulado = 0;

        carrito.forEach(item => {
            const subtotal = item.cantidad * item.precio;
            subtotalAcumulado += subtotal;
            body.innerHTML += `
                <tr>
                    <td>${item.nombre}</td>
                    <td><input type="number" step="0.1" value="${item.cantidad}" style="width: 60px;" onchange="actualizarCantidad(${item.id}, this.value)"></td>
                    <td>$${item.precio}</td>
                    <td>$${subtotal.toFixed(2)}</td>
                    <td><button onclick="eliminar(${item.id})" style="color:red; cursor:pointer;">✖</button></td>
                </tr>
            `;
        });
        document.getElementById('subtotal').innerText = subtotalAcumulado.toFixed(2);
        recalcular();
    }

    function actualizarCantidad(id, nuevaCant) {
        const item = carrito.find(i => i.id === id);
        if(item) item.cantidad = parseFloat(nuevaCant);
        dibujarTabla();
    }

    function recalcular() {
        const sub = parseFloat(document.getElementById('subtotal').innerText);
        const desc = parseFloat(document.getElementById('descuento').value) || 0;
        const final = sub - desc;
        document.getElementById('total-final').innerText = final.toFixed(2);
    }
</script>

</body>
</html>
