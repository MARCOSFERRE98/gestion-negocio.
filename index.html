<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Pet Shop & Gas</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px 15px 0 0; margin: -20px -20px 20px -20px; display: flex; justify-content: space-between; align-items: center; }
        .search-container { position: relative; margin-bottom: 25px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .search-box { border: 2px solid var(--secondary); font-size: 1.1rem; }
        .results-list { background: white; border: 1px solid #ddd; position: absolute; width: 100%; z-index: 100; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .result-item:hover { background: #f8f9fa; color: var(--secondary); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .input-table { width: 80px !important; padding: 5px; text-align: center; }
        .summary-card { background: #fdfdfd; border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .row-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .total-final { color: var(--success); font-size: 2.2rem; font-weight: bold; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 18px; width: 100%; font-size: 1.3rem; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 15px; }
        .btn-finish:hover { background: #219150; transform: translateY(-2px); }
        .badge-card { background: #fff3cd; color: #856404; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">Sistema de Gestión</h2>
            <small>Pet Shop & Servicios de Gas</small>
        </div>
        <div id="status">● En Línea</div>
    </div>

    <div class="search-container">
        <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar producto por nombre..." oninput="buscar()">
        <div id="lista-resultados" class="results-list" style="display:none;"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Kilos/Unid.</th>
                <th>Precio Unit.</th>
                <th>Total ($)</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="carrito-body">
            </tbody>
    </table>

    <div class="summary-card">
        <div class="row-flex">
            <span>Método de Pago:</span>
            <select id="metodo-pago" style="width: 200px;" onchange="recalcular()">
                <option value="efectivo">Efectivo / Transferencia</option>
                <option value="tarjeta">Tarjeta (+15% Recargo)</option>
            </select>
        </div>
        <div class="row-flex">
            <span>Descuento Directo ($):</span>
            <input type="number" id="descuento" class="input-table" value="0" oninput="recalcular()">
        </div>
        <hr>
        <div class="row-flex">
            <span>Subtotal:</span>
            <span id="txt-subtotal">$0.00</span>
        </div>
        <div id="info-recargo" class="row-flex" style="display:none; color: #856404;">
            <span>Recargo Tarjeta (15%):</span>
            <span id="txt-recargo">$0.00</span>
        </div>
        <div class="row-flex">
            <span style="font-size: 1.2rem; font-weight: bold;">TOTAL A COBRAR:</span>
            <span id="total-final" class="total-final">$0.00</span>
        </div>
        <button class="btn-finish" onclick="finalizarVenta()">FINALIZAR VENTA</button>
    </div>
</div>

<script>
    // Base de datos de productos
    const productos = [
        { id: 1, nombre: "Alimento Perro Adulto (Bolsa)", precio: 2500 },
        { id: 2, nombre: "Alimento Perro Cachorro", precio: 2800 },
        { id: 3, nombre: "Alimento Gato Mix", precio: 2200 },
        { id: 4, nombre: "Garrafa Gas 10kg", precio: 6500 },
        { id: 5, nombre: "Garrafa Gas 15kg", precio: 9800 },
        { id: 6, nombre: "Piedras Sanitarias 4kg", precio: 1500 },
        { id: 7, nombre: "Pipeta Perro Mediano", precio: 3500 }
    ];

    let carrito = [];

    function buscar() {
        const term = document.getElementById('buscador').value.toLowerCase();
        const lista = document.getElementById('lista-resultados');
        lista.innerHTML = "";
        
        if(term.length < 2) { lista.style.display = "none"; return; }

        const filtered = productos.filter(p => p.nombre.toLowerCase().includes(term));
        if(filtered.length > 0) {
            lista.style.display = "block";
            filtered.forEach(p => {
                const item = document.createElement('div');
                item.className = "result-item";
                item.innerHTML = `<span>${p.nombre}</span> <b>$${p.precio}</b>`;
                item.onclick = () => { agregar(p); lista.style.display = "none"; document.getElementById('buscador').value = ""; };
                lista.appendChild(item);
            });
        }
    }

    function agregar(p) {
        const nuevo = { ...p, cantidad: 1, totalFila: p.precio };
        carrito.push(nuevo);
        render();
    }

    // LÓGICA INVERSA:
